version: "3"
tasks:
  dev:
    desc: "Start the Astro development server"
    cmds:
      - npm run dev

  build:
    desc: "Build the site"
    cmds:
      - npm run build

  clean:
    desc: "Remove build output"
    cmds:
      - rm -rf dist

  publish:
    desc: "Commit and push changes"
    vars:
      DATE:
        sh: date +%Y-%m-%d
    cmds:
      - git add .
      - 'git commit -m "docs: update blog content {{.DATE}}"'
      - git push

  sync:
    desc: "Sync blog content from Obsidian and ensure lang frontmatter is set"
    vars:
      VAULT_PATH:
        sh: if uname -s | grep -i darwin > /dev/null; then echo "~/Obsidian/wiki/Blog/"; else echo "/mnt/c/Users/migue/Documents/wiki/03-Blog/"; fi
    cmds:
      - cmd: rsync -r {{.VAULT_PATH}} src/content/posts/
